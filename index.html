<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カレンダーに一括登録 | CalDrop</title>
  <meta name="description" content="自由な書き方で予定をまとめて入力するだけ。Googleカレンダーに一括登録できます。">
  <meta property="og:title" content="カレンダーに一括登録 | CalDrop">
  <meta property="og:description" content="自由な書き方で予定をまとめて入力するだけ。Googleカレンダーに一括登録。">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="css/style.css">
  <!-- Google Identity Services（OAuth認証ライブラリ） -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
<div class="page">
  <div class="logo">CalDrop<span>.</span></div>
  <p class="tagline">自由な書き方でまとめて入力 → Googleカレンダーに一括登録</p>

  <div class="how-to">
    <h2>使い方</h2>
    <ol>
      <li>予定を自由に入力（1行1予定）</li>
      <li>「解析する」をクリック</li>
      <li>内容を確認してチェックを調整</li>
      <li>「Googleカレンダーに登録」→ 初回のみ Google 認証</li>
    </ol>
    <p style="font-size:12px;color:var(--text-sub);margin-top:8px">例：<code>4月20日 10:00-15:00 散髪</code>　<code>4/25-27 旅行 東京</code>　<code>4月14日 休み</code></p>
  </div>

  <label class="label" for="inputText">予定テキスト</label>
  <textarea id="inputText" placeholder="4月20日 10:00-15:00 散髪
4月23日 11:00〜14:00 ランチ
4/23 15時ー17時 ジム
4/25-27 旅行 東京
4月14日 休み"></textarea>

  <div class="btn-row">
    <button class="btn btn-primary" onclick="parseEvents()">解析する</button>
    <button class="btn" onclick="clearAll()">クリア</button>
    <!-- デバッグ用：後で削除 -->
    <button class="btn" onclick="fillDebugText()" style="color:var(--info-fg);border-color:var(--info-fg)">デバッグ入力</button>
  </div>

  <div id="resultMsg" class="result-msg"></div>
  <div id="eventsList"></div>

  <div id="bulkSection" style="display:none">
    <div class="divider"></div>
    <div class="bulk-section">
      <div class="bulk-row">
        <button class="btn btn-primary" id="registerBtn" onclick="startRegistration()">
          Googleカレンダーに登録
        </button>
        <span class="count-label" id="selectedCount"></span>
      </div>
      <p class="hint">※ 初回のみ Google アカウントの認証が必要です</p>
    </div>
  </div>

  <div class="footer">CalDrop — 完全無料・登録不要・データ保存なし</div>
</div>

<!-- JS 読み込み順：依存関係の順番に並べる -->
<script src="js/config.js"></script>
<script src="js/parser.js"></script>
<script src="js/gcal.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>
<script src="js/gcal-api.js"></script>
</body>
</html>

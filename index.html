<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カレンダーに一括登録 | CalDrop</title>
  <meta name="description" content="自由な書き方で予定をまとめて入力するだけ。AIが解析してGoogleカレンダーに一括登録できます。">
  <meta property="og:title" content="カレンダーに一括登録 | CalDrop">
  <meta property="og:description" content="自由な書き方で予定をまとめて入力するだけ。Googleカレンダーに一括登録。">
  <meta property="og:type" content="website">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f9f9f7;
      --surface: #ffffff;
      --border: #e5e4de;
      --text: #1a1a18;
      --text-sub: #6b6b66;
      --accent: #1a1a18;
      --accent-fg: #ffffff;
      --success-bg: #eaf3de;
      --success-fg: #3b6d11;
      --info-bg: #e6f1fb;
      --info-fg: #185fa5;
      --danger-bg: #fcebeb;
      --danger-fg: #a32d2d;
      --radius: 10px;
      --radius-sm: 6px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18;
        --surface: #242422;
        --border: #363632;
        --text: #f0efe8;
        --text-sub: #9a9a92;
        --accent: #f0efe8;
        --accent-fg: #1a1a18;
        --success-bg: #173404;
        --success-fg: #c0dd97;
        --info-bg: #042c53;
        --info-fg: #b5d4f4;
        --danger-bg: #501313;
        --danger-fg: #f7c1c1;
      }
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Hiragino Sans', 'Yu Gothic', sans-serif; min-height: 100vh; }
    .page { max-width: 680px; margin: 0 auto; padding: 3rem 1.5rem 6rem; }
    .logo { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 0.25rem; }
    .logo span { opacity: 0.35; }
    .tagline { font-size: 14px; color: var(--text-sub); margin-bottom: 2.5rem; }
    .label { font-size: 13px; font-weight: 500; color: var(--text-sub); margin-bottom: 6px; display: block; }
    textarea {
      width: 100%; min-height: 160px; font-size: 14px; padding: 14px;
      border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--surface); color: var(--text);
      font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
      line-height: 1.7; resize: vertical; outline: none;
      transition: border-color 0.15s;
    }
    textarea:focus { border-color: var(--text); }
    textarea::placeholder { color: var(--text-sub); opacity: 0.6; }
    .btn-row { display: flex; gap: 8px; margin: 12px 0 24px; }
    .btn { font-size: 14px; padding: 9px 20px; border-radius: var(--radius-sm); cursor: pointer; font-weight: 500; transition: opacity 0.15s, transform 0.1s; border: 1px solid var(--border); background: var(--surface); color: var(--text); }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
    .btn-primary:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .result-msg { padding: 12px 16px; border-radius: var(--radius-sm); font-size: 14px; margin-bottom: 16px; display: none; }
    .result-ok { background: var(--success-bg); color: var(--success-fg); }
    .result-err { background: var(--danger-bg); color: var(--danger-fg); }
    .section-label { font-size: 13px; font-weight: 500; color: var(--text-sub); margin-bottom: 10px; }
    .events-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
    .event-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 13px 16px;
      display: flex; align-items: flex-start; gap: 12px;
      transition: border-color 0.15s;
    }
    .event-card:hover { border-color: var(--text-sub); }
    .event-check { margin-top: 3px; cursor: pointer; width: 16px; height: 16px; flex-shrink: 0; accent-color: var(--accent); }
    .event-info { flex: 1; min-width: 0; }
    .event-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .event-meta { font-size: 13px; color: var(--text-sub); display: flex; gap: 14px; flex-wrap: wrap; }
    .event-meta span { display: flex; align-items: center; gap: 4px; }
    .add-btn {
      font-size: 12px; padding: 5px 12px; border-radius: var(--radius-sm);
      background: var(--info-bg); color: var(--info-fg);
      border: none; cursor: pointer; white-space: nowrap; flex-shrink: 0;
      font-weight: 500; text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
    }
    .add-btn:hover { opacity: 0.8; }
    .add-btn.done { opacity: 0.45; cursor: default; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
    .bulk-section { }
    .bulk-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .count-label { font-size: 13px; color: var(--text-sub); }
    .hint { font-size: 12px; color: var(--text-sub); margin-top: 6px; opacity: 0.7; }
    .footer { margin-top: 4rem; padding-top: 1.5rem; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-sub); text-align: center; }
    .how-to { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 2rem; }
    .how-to h2 { font-size: 13px; font-weight: 600; margin-bottom: 10px; }
    .how-to ol { font-size: 13px; color: var(--text-sub); padding-left: 18px; line-height: 2; }
    .how-to code { font-family: monospace; background: var(--bg); padding: 1px 5px; border-radius: 3px; font-size: 12px; }
  </style>
</head>
<body>
<div class="page">
  <div class="logo">CalDrop<span>.</span></div>
  <p class="tagline">自由な書き方でまとめて入力 → Googleカレンダーに一括登録</p>

  <div class="how-to">
    <h2>使い方</h2>
    <ol>
      <li>予定を自由に入力（1行1予定）</li>
      <li>「解析する」をクリック</li>
      <li>内容を確認して「追加」または「まとめて開く」</li>
    </ol>
    <p style="font-size:12px;color:var(--text-sub);margin-top:8px">例：<code>4月20日 10:00-15:00 散髪</code>　<code>4/25-27 旅行 東京</code>　<code>4月14日 休み</code></p>
  </div>

  <label class="label" for="inputText">予定テキスト</label>
  <textarea id="inputText" placeholder="4月20日 10:00-15:00 散髪
4月23日 11:00〜14:00 ランチ
4/23 15時ー17時 ジム
4/25-27 旅行 東京
4月14日 休み"></textarea>

  <div class="btn-row">
    <button class="btn btn-primary" id="parseBtn" onclick="parseEvents()">解析する</button>
    <button class="btn" onclick="clearAll()">クリア</button>
  </div>

  <div id="resultMsg" class="result-msg"></div>
  <div id="eventsList"></div>

  <div id="bulkSection" style="display:none">
    <div class="divider"></div>
    <div class="bulk-section">
      <div class="bulk-row">
        <button class="btn btn-primary" onclick="openAll()">選択した予定をまとめて開く</button>
        <span class="count-label" id="selectedCount"></span>
      </div>
      <p class="hint">※ ブラウザのポップアップを許可してください</p>
    </div>
  </div>

  <div class="footer">CalDrop — 完全無料・登録不要・データ保存なし</div>
</div>

<script>
let parsedEvents = [];

function toHHMM(str) {
  if (!str) return null;
  str = str.replace(/：/g, ':').trim();
  const m = str.match(/(\d{1,2})[時:](\d{0,2})/);
  if (!m) return null;
  return m[1].padStart(2,'0') + ':' + (m[2] || '00').padStart(2,'0');
}

function parseDate(str, year) {
  str = str.trim();
  let m = str.match(/(\d{1,2})[\/\-](\d{1,2})/);
  if (m) return year + '-' + m[1].padStart(2,'0') + '-' + m[2].padStart(2,'0');
  m = str.match(/(\d{1,2})月(\d{1,2})日?/);
  if (m) return year + '-' + m[1].padStart(2,'0') + '-' + m[2].padStart(2,'0');
  return null;
}

function parseLine(line, year) {
  line = line.trim();
  if (!line) return null;
  let date = null, endDate = null, startTime = null, endTime = null, title = '', location = null, allDay = false;
  let rest = line;

  const rangeDateM = rest.match(/(\d{1,2})[\/\-](\d{1,2})\s*[\-〜~～]\s*(\d{1,2})/);
  if (rangeDateM) {
    const mo = rangeDateM[1].padStart(2,'0');
    date = year + '-' + mo + '-' + rangeDateM[2].padStart(2,'0');
    endDate = year + '-' + mo + '-' + rangeDateM[3].padStart(2,'0');
    rest = rest.replace(rangeDateM[0], '').trim();
    allDay = true;
  } else {
    for (const pat of [/(\d{1,2})月(\d{1,2})日?/, /(\d{1,2})[\/](\d{1,2})/]) {
      const dm = rest.match(pat);
      if (dm) { date = parseDate(dm[0], year); rest = rest.replace(dm[0], '').trim(); break; }
    }
  }
  if (!date) return null;

  const trM = rest.match(/(\d{1,2}(?:[時:：]\d{0,2})?)\s*[-〜~～ー]\s*(\d{1,2}(?:[時:：]\d{0,2})?)/);
  if (trM) {
    startTime = toHHMM(trM[1]);
    endTime = toHHMM(trM[2]);
    rest = rest.replace(trM[0], '').trim();
  } else {
    const stM = rest.match(/\d{1,2}[時:：]\d{2}/);
    if (stM) { startTime = toHHMM(stM[0]); rest = rest.replace(stM[0], '').trim(); }
  }
  if (!startTime) allDay = true;

  rest = rest.replace(/^[\s\u3000\-　]+/, '').replace(/[\s\u3000\-　]+$/, '');
  const locKW = ['東京','大阪','京都','名古屋','福岡','札幌','横浜','神戸','沖縄','仙台'];
  const parts = rest.split(/[\s\u3000]+/);
  const li = parts.findIndex(p => locKW.some(k => p.includes(k)));
  if (li >= 0) location = parts.splice(li, 1)[0];
  title = parts.join(' ').trim() || '予定';
  return { title, date, endDate, startTime, endTime, location, allDay };
}

function makeGCalURL(ev) {
  const base = 'https://calendar.google.com/calendar/render?action=TEMPLATE';
  let dates;
  if (ev.allDay) {
    const s = ev.date.replace(/-/g,'');
    const d = new Date(ev.endDate || ev.date);
    d.setDate(d.getDate() + 1);
    const e = d.toISOString().slice(0,10).replace(/-/g,'');
    dates = s + '/' + e;
  } else {
    const st = ev.startTime || '09:00';
    const h = parseInt(st.split(':')[0]);
    const et = ev.endTime || (h+1).toString().padStart(2,'0') + ':' + st.split(':')[1];
    dates = ev.date + 'T' + st + ':00/' + ev.date + 'T' + et + ':00';
  }
  let url = base + '&text=' + encodeURIComponent(ev.title) + '&dates=' + dates;
  if (ev.location) url += '&location=' + encodeURIComponent(ev.location);
  return url;
}

function parseEvents() {
  const text = document.getElementById('inputText').value.trim();
  if (!text) return;
  const year = new Date().getFullYear().toString();
  parsedEvents = text.split(/\n/).map(l => parseLine(l, year)).filter(Boolean);
  if (!parsedEvents.length) { showResult('予定を認識できませんでした。書き方を確認してください。', 'err'); return; }
  showResult('', '');
  renderEvents();
}

function renderEvents() {
  const list = document.getElementById('eventsList');
  list.innerHTML = '<p class="section-label">' + parsedEvents.length + '件を解析しました — 確認してから追加してください</p>';
  const cards = document.createElement('div');
  cards.className = 'events-list';
  parsedEvents.forEach((ev, i) => {
    const card = document.createElement('div');
    card.className = 'event-card';
    card.id = 'card-' + i;
    const dateStr = ev.endDate ? ev.date + ' 〜 ' + ev.endDate : ev.date;
    const timeStr = ev.allDay ? '終日' : (ev.startTime ? ev.startTime + (ev.endTime ? ' – ' + ev.endTime : '') : '時間未定');
    const locStr = ev.location ? '<span>📍 ' + ev.location + '</span>' : '';
    card.innerHTML =
      '<input type="checkbox" class="event-check" id="chk-' + i + '" checked onchange="updateCount()">' +
      '<div class="event-info"><p class="event-title">' + ev.title + '</p>' +
      '<p class="event-meta"><span>📅 ' + dateStr + '</span><span>🕐 ' + timeStr + '</span>' + locStr + '</p></div>' +
      '<a href="' + makeGCalURL(ev) + '" target="_blank" class="add-btn" id="addbtn-' + i + '" onclick="markDone(' + i + ')">＋ 追加</a>';
    cards.appendChild(card);
  });
  list.appendChild(cards);
  document.getElementById('bulkSection').style.display = 'block';
  updateCount();
}

function markDone(i) {
  setTimeout(() => {
    const b = document.getElementById('addbtn-' + i);
    if (b) { b.textContent = '✓ 追加済み'; b.classList.add('done'); }
  }, 400);
}

function updateCount() {
  const checked = document.querySelectorAll('.event-check:checked').length;
  document.getElementById('selectedCount').textContent = checked + ' / ' + parsedEvents.length + ' 件選択中';
}

function openAll() {
  parsedEvents.forEach((ev, i) => {
    const chk = document.getElementById('chk-' + i);
    if (chk && chk.checked) { window.open(makeGCalURL(ev), '_blank'); markDone(i); }
  });
}

function showResult(msg, type) {
  const el = document.getElementById('resultMsg');
  if (!msg) { el.style.display = 'none'; return; }
  el.className = 'result-msg ' + (type === 'ok' ? 'result-ok' : 'result-err');
  el.textContent = msg;
  el.style.display = 'block';
}

function clearAll() {
  document.getElementById('inputText').value = '';
  document.getElementById('eventsList').innerHTML = '';
  document.getElementById('bulkSection').style.display = 'none';
  showResult('', '');
  parsedEvents = [];
}
</script>
</body>
</html>
